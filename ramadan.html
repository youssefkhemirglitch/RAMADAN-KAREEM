<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Kareem</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Arial Black', sans-serif;
}

/* 3D Gold Text */
h1 {
    font-size: 4rem;
    color: #FFD700;
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 4px;
    text-shadow:
        1px 1px 0 #b8860b,
        2px 2px 0 #b8860b,
        3px 3px 0 #b8860b,
        4px 4px 0 #b8860b,
        5px 5px 15px rgba(255, 215, 0, 0.8);
    animation: glow 2s ease-in-out infinite alternate;
}

/* Glow animation */
@keyframes glow {
    from { text-shadow:
        1px 1px 0 #b8860b,
        2px 2px 0 #b8860b,
        3px 3px 0 #b8860b,
        4px 4px 0 #b8860b,
        5px 5px 15px rgba(255, 215, 0, 0.6);
    }
    to { text-shadow:
        1px 1px 0 #b8860b,
        2px 2px 0 #b8860b,
        3px 3px 0 #b8860b,
        4px 4px 0 #b8860b,
        5px 5px 25px rgba(255, 215, 0, 1);
    }
}

/* Stars */
.star {
    position: absolute;
    font-size: 20px;
    animation: float linear infinite;
}

@keyframes float {
    from {
        transform: translateY(100vh);
        opacity: 1;
    }
    to {
        transform: translateY(-10vh);
        opacity: 0;
    }
}
</style>
</head>

<body>

<h1>🌙 Ramadan Kareem 🌙</h1>

<script>
// Create moving stars
for (let i = 0; i < 40; i++) {
    let star = document.createElement("div");
    star.className = "star";
    star.innerHTML = "✨";

    star.style.left = Math.random() * 100 + "vw";
    star.style.animationDuration = (3 + Math.random() * 5) + "s";
    star.style.fontSize = (15 + Math.random() * 20) + "px";

    document.body.appendChild(star);
}
</script>

</body>
</html>
